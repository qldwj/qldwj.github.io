<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问问题汇总</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        h1 {
            color: #0066cc;
            font-size: 28px;
            margin-bottom: 20px;
            text-align: center;
        }
        .img-box {
            margin: 20px 0;
            text-align: center;
        }
        .img-box img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
        }
        .tip {
            font-size: 18px;
            color: #d9534f;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
        }
        .footer a {
            color: #0066cc;
            text-decoration: none;
            font-weight: bold;
        }
        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>访问问题汇总</h1>
            
            <div class="img-box">
                <img src="图片1.png" alt="访问问题截图1">
                <img src="图片2.png" alt="访问问题截图2">
            </div>

            <div class="tip">
                出现以上情况请开启VPN
            </div>

            <div class="footer">
                此网站为 <a href="https://qldwj.github.io" target="_blank">qldwj.github.io</a> 问题汇总
            </div>
        </div>
    </div>
</body>
</html>
