<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>远程控制台</title>
<style>
body{background:#111;color:#0f0;padding:20px;font-family:monospace;}
textarea{width:100%;height:100px;background:#222;border:1px solid #333;color:#0f0;}
button{padding:6px 16px;background:#0066cc;color:#fff;border:0;margin:5px;}
pre{background:#222;padding:10px;border:1px solid #333;white-space:pre-wrap;}
</style>
</head>
<body>
<h2>GitHub 远程命令控制台</h2>
<textarea id="txt" placeholder="输入：echo 你好"></textarea>
<br>
<button onclick="setCmd()">发送命令</button>
<button onclick="clearCmd()">清空命令</button>
<pre id="log"></pre>

<script>
// 你的cmd.txt
let raw = "https://raw.githubusercontent.com/qldwj/qldwj.github.io/main/cmd.txt";

// 用中转跨域 + 防缓存
function getUrl(){
    let t = new Date().getTime();
    return "https://api.allorigins.win/raw?url="+encodeURIComponent(raw+"?_="+t);
}

// 手动复制内容，你粘贴到github cmd.txt 就行
function setCmd(){
    let v = document.getElementById("txt").value.trim();
    if(!v)return;
    document.getElementById("log").innerText = "已生成命令：\n"+v+"\n\n请复制，去GitHub编辑cmd.txt粘贴保存";
}
function clearCmd(){
    document.getElementById("log").innerText = "请去GitHub把cmd.txt内容清空保存";
}

// 自动读取当前命令
setInterval(async ()=>{
    let res = await fetch(getUrl());
    let text = await res.text();
    document.getElementById("log").innerText = "当前生效命令：\n"+text;
},2000);
</script>
</body>
</html>
